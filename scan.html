<!DOCTYPE html>
<html>
<head>
<title>Scan</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- FIXED HEADER -->
<div class="header fixed-header">
  <div class="logo-header">
    <img src="logo.png" alt="Tikaaram Logo">
    <div class="logo-text">
      <h2>Tikaaram</h2>
      <p>OMR Scanning System</p>
    </div>
  </div>
</div>

<div class="app">

<!-- PAGE TITLE -->
<div class="card fade-in">
  <h3>Scan Answer Sheet</h3>
  <p class="small">
    Capture or upload an OMR sheet and automatically compute results.
  </p>
</div>

<!-- CAMERA / PREVIEW SECTION -->
<div class="card fade-in delay">
  <div class="camera-box">
    <video id="video" autoplay></video>
    <img id="preview" style="display:none;">
  </div>

  <p class="small" style="margin-top:10px;">
    Use camera or upload an image for scanning.
  </p>
</div>

<!-- INPUT SECTION -->
<div class="card fade-in delay-2">

  <h4>Student Information</h4>
  <input id="student" placeholder="Enter Student Name">

  <!-- ✅ NEW SUBJECT SELECTOR -->
  <h4 style="margin-top:15px;">Subject Type</h4>
  <select id="subject" style="
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
  ">
    <option value="Math">Math</option>
    <option value="Literacy">Literacy</option>
  </select>

  <h4 style="margin-top:15px;">Answer Key</h4>
  <input id="key" value="B,D,A,C,B">

  <div class="button-group">
    <button onclick="startCamera()">📷 Camera</button>
    <button onclick="upload()">⬆ Upload</button>
    <button class="primary-btn" onclick="scan()">Scan Paper</button>
  </div>

  <input type="file" id="file" hidden>
</div>

</div>

<!-- NAVBAR -->
<div class="navbar">
  <a href="index.html">🏠<br>Home</a>
  <a href="scan.html" class="active">📷<br>Scan</a>
  <a href="students.html">👥<br>Students</a>
  <a href="profile.html">👤<br>Profile</a>
</div>

<!-- =========================
     MODAL RESULT
========================= -->
<div id="resultModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  justify-content:center;
  align-items:center;
  z-index:9999;
">

  <div style="
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.95);
    border-radius:20px;
    padding:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation: popIn 0.25s ease-out;
    position:relative;
  ">

    <button onclick="closeModal()" style="
      position:absolute;
      top:10px;
      right:10px;
      width:32px;
      height:32px;
      border:none;
      border-radius:50%;
      background:#ff4d4d;
      color:white;
      font-size:16px;
      cursor:pointer;
    ">✖</button>

    <h3 style="text-align:center; margin:0;">Scan Result</h3>

    <h4 id="modalSubject" style="
      text-align:center;
      margin:5px 0;
      color:#888;
    "></h4>

    <h1 id="modalScore" style="
      text-align:center;
      margin:10px 0;
      font-size:32px;
      color:#2ecc71;
    ">--</h1>

    <div id="modalResults" style="max-height:200px; overflow:auto;"></div>

  </div>
</div>

<style>
.result-item{
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  font-size:14px;
  display:flex;
  justify-content:space-between;
}

.result-item.correct{
  background:#e8f9f0;
  border-left:5px solid #2ecc71;
}

.result-item.wrong{
  background:#ffecec;
  border-left:5px solid #e74c3c;
}

@keyframes popIn{
  from{transform:scale(0.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
</style>

<script src="app.js"></script>

<script>
let video = document.getElementById("video");
let preview = document.getElementById("preview");
let file = document.getElementById("file");

function startCamera(){
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream);
}

function upload(){
  file.click();
}

file.onchange = e => {
  let url = URL.createObjectURL(e.target.files[0]);
  preview.src = url;
  preview.style.display = "block";
  video.style.display = "none";
};

/*
====================================================
SCAN FUNCTION (UPDATED WITH SUBJECT)
====================================================
*/
function scan(){
  let key = document.getElementById("key").value.split(",");
  let answers = ["B","D","A","C","B"];

  let correct = 0;
  let output = "";

  answers.forEach((a,i)=>{
    let ok = a === key[i];
    if(ok) correct++;

    output += `
      <div class="result-item ${ok ? 'correct' : 'wrong'}">
        <span>Question ${i+1}</span>
        <span>${a}</span>
      </div>
    `;
  });

  let score = `${correct}/${key.length}`;

  let name = document.getElementById("student").value || "Unknown";
  let subject = document.getElementById("subject").value;

  // SAVE WITH SUBJECT (IMPORTANT FOR FILTERING)
  saveStudent(name, [correct], subject);

  document.getElementById("modalSubject").innerText = subject;
  document.getElementById("modalScore").innerText = score;
  document.getElementById("modalResults").innerHTML = output;

  document.getElementById("resultModal").style.display = "flex";
}

/*
====================================================
CLOSE MODAL
====================================================
*/
function closeModal(){
  document.getElementById("resultModal").style.display = "none";
}
</script>

</body>
</html>
